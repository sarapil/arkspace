name: ARKSpace CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check arkspace/

      - name: Run ruff format check
        run: ruff format --check arkspace/

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: _test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis-cache:
        image: redis:7-alpine
        ports:
          - 13000:6379

      redis-queue:
        image: redis:7-alpine
        ports:
          - 11000:6379

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install bench
        run: pip install frappe-bench

      - name: Init bench
        run: |
          bench init --skip-redis-config-generation --frappe-branch version-16 frappe-bench
        env:
          CI: true

      - name: Configure bench
        working-directory: frappe-bench
        run: |
          bench set-config -g db_host 127.0.0.1
          bench set-config -g db_port 3306
          bench set-config -g db_root_username root
          bench set-config -g db_root_password root
          bench set-config -g redis_cache redis://127.0.0.1:13000
          bench set-config -g redis_queue redis://127.0.0.1:11000

      - name: Install ERPNext
        working-directory: frappe-bench
        run: |
          bench get-app --branch version-16 erpnext

      - name: Checkout ARKSpace
        uses: actions/checkout@v4
        with:
          path: frappe-bench/apps/arkspace

      - name: Create test site
        working-directory: frappe-bench
        run: |
          bench new-site --db-root-password root --admin-password admin test.local
          bench --site test.local install-app erpnext
          bench --site test.local install-app arkspace

      - name: Run tests
        working-directory: frappe-bench
        run: |
          bench --site test.local run-tests --app arkspace --failfast
        env:
          CI: true

  translations:
    name: Translation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check ar.csv format
        run: |
          echo "Checking Arabic translations file..."
          if [ ! -f arkspace/translations/ar.csv ]; then
            echo "❌ arkspace/translations/ar.csv not found"
            exit 1
          fi
          LINES=$(wc -l < arkspace/translations/ar.csv)
          echo "✅ ar.csv has $LINES translation entries"

      - name: Check for hardcoded Arabic in source
        run: |
          echo "Scanning for hardcoded Arabic text in source files..."
          FINDINGS=$(grep -rn '[؀-ۿ]' arkspace/ \
            --include="*.py" --include="*.js" \
            --exclude-dir=translations \
            --exclude-dir=__pycache__ \
            || true)
          if [ -n "$FINDINGS" ]; then
            echo "⚠️ Found potential hardcoded Arabic text:"
            echo "$FINDINGS"
            echo "Consider moving these to translations/ar.csv"
          else
            echo "✅ No hardcoded Arabic found in source files"
          fi
