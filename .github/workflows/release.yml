name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for version
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          awk "/^## \[?${version}/ {found=1; next} /^## / {if(found) exit} found" CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release v${version}" > release_notes.md
          fi
          echo "Release notes:"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify version consistency
        run: |
          tag_version="${GITHUB_REF#refs/tags/v}"
          init_version=$(python3 -c "
          import re
          with open('arkspace/__init__.py') as f:
              content = f.read()
          match = re.search(r'__version__\s*=\s*[\"'\\']([^\"'\\']+)', content)
          print(match.group(1) if match else 'unknown')
          ")
          echo "Tag version: $tag_version"
          echo "Init version: $init_version"
          if [ "$tag_version" != "$init_version" ]; then
            echo "::warning::Version mismatch: tag=$tag_version, __init__.py=$init_version"
          fi

      - name: Check required files
        run: |
          for f in README.md LICENSE CHANGELOG.md CONTRIBUTING.md SECURITY.md; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done
          echo "All required release files present ✅"
