<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sp-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B365D"/>
      <stop offset="100%" stop-color="#2A4A7F"/>
    </linearGradient>
    <linearGradient id="sp-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4BC78"/>
      <stop offset="50%" stop-color="#C4A962"/>
      <stop offset="100%" stop-color="#A38B4C"/>
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="200" fill="url(#sp-g)" opacity="0.12">
    <animate attributeName="r" values="195;205;195" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#sp-gold)" stroke-width="1.5"
          stroke-dasharray="15 8" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate"
                      from="0 256 256" to="360 256 256" dur="25s" repeatCount="indefinite"/>
  </circle>
  <path d="M256 120L180 370h30l18-50h56l18 50h30z" fill="url(#sp-gold)" opacity="0">
    <animate attributeName="opacity" from="0" to="0.95" dur="0.8s" begin="0.3s" fill="freeze"/>
  </path>
  <rect x="218" y="285" width="76" height="18" rx="4" fill="#1B365D" opacity="0">
    <animate attributeName="opacity" from="0" to="0.85" dur="0.5s" begin="0.8s" fill="freeze"/>
  </rect>
  <text x="256" y="430" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
        font-size="36" font-weight="700" fill="#1B365D" opacity="0">
    ARKSpace
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.2s" fill="freeze"/>
  </text>
  <text x="256" y="460" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
        font-size="14" fill="#1B365D" opacity="0">
    Co-Working Space Management
    <animate attributeName="opacity" from="0" to="0.6" dur="0.5s" begin="1.5s" fill="freeze"/>
